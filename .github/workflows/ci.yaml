name: Pipeline

on:
  push:
    branches:
      - main
      - feat/base-interview-assesment
  pull_request:
    branches:
      - main

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: log-analytics
  ECS_CLUSTER: log-analytics
  ECS_SERVICE: log-analytics

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run fast unit tests
        run: pytest -m "not slow" -v

  deploy:
    runs-on: ubuntu-latest
    needs: ci                        # only runs if ci passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write                # required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::206453958024:role/log-analytics-github-actions
          aws-region: ${{ env.AWS_REGION }}

      # ── Step 1: create ECR repo before pushing image ────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6"

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Provision ECR repository
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -target=aws_ecr_lifecycle_policy.app

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag from git SHA
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            --build-arg GIT_SHA=$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -var="image_tag=${{ steps.meta.outputs.tag }}"

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      - name: Print CloudFront URL
        working-directory: infra
        run: terraform output cloudfront_url
